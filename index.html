<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dexitcards — Coming Soon</title>
  <meta name="description" content="Your collection is a portfolio. Dexitcards is a new way to track, share, and understand your card collection." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Three text sizes only (logo uses rem for visual rhythm, not an extra type size) */
      --text-display: clamp(2rem, 5vw, 2.75rem);
      --text-body:    1rem;
      --text-sm:      0.875rem;

      --bg:               hsl(212, 22%, 7%);
      --surface:          hsl(218, 20%, 12%);
      --border:           hsl(165 22% 34% / 0.55);
      --border-strong:    hsl(165 28% 42% / 0.35);
      --primary:          hsl(155, 70%, 45%);
      --accent:           hsl(185, 60%, 50%);
      --text-primary:     hsl(210, 22%, 96%);
      --text-secondary:   hsl(212, 14%, 71%);
      --text-muted:       hsl(215, 11%, 48%);
      --space-xs:         0.75rem;
      --space-sm:         1.25rem;
      --space-md:         2rem;
      --space-lg:         2.75rem;
      --space-xl:         3.25rem;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-size: var(--text-body);
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 50% 0%, hsl(165 35% 22% / 0.12) 0%, transparent 55%);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* flex-start: content stays pinned from the top when height changes (e.g. form → success) */
      justify-content: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(1.5rem, 4vw, 2.5rem);
      padding-top: max(clamp(2rem, 5vh, 3.5rem), env(safe-area-inset-top, 0px));
      padding-bottom: max(clamp(1.5rem, 4vw, 2.5rem), env(safe-area-inset-bottom, 0px));
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, hsl(155 70% 45% / 0.08) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -25%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, hsl(185 60% 50% / 0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    /* Default was 3.9rem; −20% ≈ 3.12rem */
    .site-logo {
      display: block;
      height: 3.12rem;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 2.25rem;
    }

    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--text-display);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }

    .headline .highlight {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Same size as body; weight + tracking + case carry the hierarchy */
    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--text-body);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 2rem;
      margin-bottom: 4rem;
    }

    .subhead {
      font-size: var(--text-body);
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 2.25rem;
    }

    .notify-form {
      display: flex;
      align-items: stretch;
      gap: 0.5rem;
      margin-bottom: 0;
      width: 100%;
    }

    .notify-form input[type="email"] {
      flex: 1;
      min-height: 48px;
      background: linear-gradient(180deg, hsl(218 22% 14%) 0%, hsl(218 20% 11%) 100%);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0 1rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: inherit;
      line-height: 1.25;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow:
        0 1px 0 hsl(165 40% 50% / 0.06),
        inset 0 1px 0 hsl(0 0% 100% / 0.03);
    }

    .notify-form input[type="email"]::placeholder {
      color: var(--text-muted);
    }

    .notify-form input[type="email"]:focus {
      border-color: var(--border-strong);
      box-shadow:
        0 0 0 2px hsl(155 70% 45% / 0.22),
        0 1px 0 hsl(165 40% 50% / 0.08),
        inset 0 1px 0 hsl(0 0% 100% / 0.04);
    }

    .notify-form button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: inherit;
      min-height: 48px;
      padding: 0 22px;
      line-height: 1.25;
      background: linear-gradient(135deg, #22d3a6 0%, #1fcaa0 40%, #16b892 100%);
      color: #062a22;
      font-weight: 600;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: ctaBreath 3.5s ease-in-out infinite;
      box-shadow:
        0 4px 14px rgba(34, 211, 166, 0.25),
        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .notify-form button:hover {
      animation: none;
      transform: translateY(-1px) scale(1.01);
      box-shadow:
        0 8px 24px rgba(34, 211, 166, 0.35),
        0 0 14px rgba(34, 211, 166, 0.25);
    }

    .notify-form button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        0 2px 8px rgba(34, 211, 166, 0.2);
    }

    .notify-form button:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 3px rgba(34, 211, 166, 0.4),
        0 4px 14px rgba(34, 211, 166, 0.25);
    }

    /* One “small” size: note, pills, footer, success banner */
    .notify-note {
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-xl);
    }

    /* Keeps vertical rhythm whether the form or success message is visible */
    .cta-stack {
      margin-bottom: 0;
    }

    .success-msg {
      display: none;
      background: hsl(155 70% 45% / 0.08);
      border: 1px solid hsl(155 70% 45% / 0.25);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-size: var(--text-sm);
      color: var(--primary);
      margin-top: 0;
    }

    /* Mockup: two pills on row one, third centered below — hidden for now */
    .features {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.625rem 0.75rem;
      max-width: 100%;
      width: 100%;
      margin-top: 0;
      margin-bottom: 2.75rem;
    }

    .features .pill {
      justify-self: center;
    }

    .features .pill:nth-child(3) {
      grid-column: 1 / -1;
      justify-self: center;
    }

    .pill {
      background: linear-gradient(180deg, hsl(218 22% 14%) 0%, hsl(218 18% 10%) 100%);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.4rem 0.95rem;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      box-shadow:
        0 1px 0 hsl(165 35% 45% / 0.07),
        inset 0 1px 0 hsl(0 0% 100% / 0.04);
    }

    .footer {
      font-size: calc(var(--text-sm) * 0.8);
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 1.5rem;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--text-secondary);
    }

    .footer-emojis {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.75rem;
      font-size: calc(var(--text-sm) * 0.95);
      line-height: 1.6;
      color: var(--text-muted);
      user-select: none;
    }

    .animated-tagline {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .animated-tagline span {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: wordFade 2s ease-out both;
    }

    .animated-tagline span:nth-child(1) {
      animation-delay: 0.1s;
    }

    .animated-tagline span:nth-child(2) {
      animation-delay: 0.5s;
    }

    .animated-tagline span:nth-child(3) {
      animation-delay: 0.9s;
    }

    @keyframes wordFade {
      0% {
        opacity: 0;
        transform: translateY(6px);
      }
      40% {
        opacity: 1;
        transform: translateY(0);
      }
      80% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0.85;
        transform: translateY(0);
      }
    }

    @keyframes ctaBreath {
      0% {
        box-shadow:
          0 4px 14px rgba(34, 211, 166, 0.25),
          0 0 0 rgba(34, 211, 166, 0);
      }
      50% {
        box-shadow:
          0 6px 22px rgba(34, 211, 166, 0.35),
          0 0 18px rgba(34, 211, 166, 0.25);
      }
      100% {
        box-shadow:
          0 4px 14px rgba(34, 211, 166, 0.25),
          0 0 0 rgba(34, 211, 166, 0);
      }
    }

    @media (max-width: 420px) {
      .site-logo {
        height: 2.6rem;
      }

      .notify-form {
        flex-direction: column;
      }

      .notify-form button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .notify-form button {
        animation: none;
      }

      .animated-tagline span {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="logo_dexit_header.svg" alt="Dexitcards" class="site-logo" />

    <h1 class="headline">Know your collection.<br><span class="highlight">Find your next card.</span></h1>

    <p class="subhead">
      Snap a photo and we’ll do the rest.   
    </p>

    <div class="cta-stack">
      <form class="notify-form" id="notifyForm" onsubmit="handleSubmit(event)">
        <input type="email" placeholder="Enter your email" required aria-label="Email address" />
        <button type="submit">Get Early Access</button>
      </form>
      <div class="success-msg" id="successMsg">
        You're on the list. Opening day is happening soon.
      </div>
    </div>

    <p class="tagline animated-tagline">
      <span>Snap.</span>
      <span>Dex.</span>
      <span>Done.</span>
    </p>

    <div class="features">
      <span class="pill">Dex your cards in seconds</span>
      <span class="pill">See real-time values</span>
      <span class="pill">Find cards you’ll love</span>
    </div>

    <p class="footer">
      &copy; 2026 Dexitcards
    </p>
    <p class="footer-emojis" aria-hidden="true"><span>⚾</span><span>🏈</span><span>⚽</span><span>🏀</span><span>👾</span></p>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = document.getElementById('notifyForm');
      const success = document.getElementById('successMsg');
      form.style.display = 'none';
      const note = document.querySelector('.notify-note');
      if (note) note.style.display = 'none';
      success.style.display = 'block';
    }
  </script>
</body>
</html>
