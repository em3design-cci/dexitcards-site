  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #0d1117;
      background-image: radial-gradient(ellipse 90% 55% at 50% 0%, rgba(34,197,158,0.08) 0%, transparent 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #f0f4f8;
    }
    .card {
      width: 100%;
      max-width: 480px;
      margin: 24px;
      background-color: #141a22;
      border: 1px solid rgba(46,120,95,0.35);
      border-radius: 16px;
      padding: 48px 40px 40px;
      text-align: center;
    }
    .logo {
      display: block;
      width: 148px;
      height: auto;
      margin: 0 auto 32px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: 'Space Grotesk', Inter, sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f0f4f8;
    }
    p {
      margin: 0 0 28px;
      font-size: 15px;
      line-height: 1.65;
      color: #b4bcc8;
    }
    .badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
      background-color: rgba(34,197,158,0.05);
      border: 1px solid rgba(46,120,95,0.12);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #34d399;
      margin-bottom: 32px;
    }
    .footer {
      font-size: 12px;
      color: #4b5563;
      border-top: 1px solid rgba(46,120,95,0.2);
      padding-top: 20px;
      margin-top: 8px;
    }
    .footer a {
      color: #6b7280;
      text-decoration: underline;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
    }
